<!DOCTYPE html>
<html>
<head>
    <title>Weather App</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header>
        <h1>Weather App</h1>

        <nav>
            <a href="#">Home</a> |
            <a href="#">About</a> |
            <a href="#">Contact</a>
        </nav>
    </header>

    <hr>

    <section>
        <h2>Search Weather</h2>

        <form>
            <label>City Name:</label>
            <input type="text" placeholder="Enter city" required>

            <br><br>

            <label>Email:</label>
            <input type="email" placeholder="Enter email" required>

            <br><br>

            <button type="submit">Search</button>
        </form>
    </section>

    <hr>

    <!-- Weather Info -->
    <section>
        <h2>Weather Info</h2>

        <article>
            <h3>Delhi</h3>
            <p>Temperature: 30°C</p>
            <p>Condition: Sunny</p>
        </article>

        <article>
            <h3>Mumbai</h3>
            <p>Temperature: 28°C</p>
            <p>Condition: Humid</p>
        </article>
    </section>

    <hr>

    <section>
        <h2>Weekly Forecast</h2>

        <table border="1">
            <tr>
                <th>Day</th>
                <th>Temp</th>
                <th>Weather</th>
            </tr>

            <tr>
                <td>Monday</td>
                <td>30°C</td>
                <td>Sunny</td>
            </tr>

            <tr>
                <td>Tuesday</td>
                <td>28°C</td>
                <td>Cloudy</td>
            </tr>
        </table>
    </section>

    <hr>

    <footer>
        <p>© 2026 Weather App</p>
    </footer>

</body>
</html>
